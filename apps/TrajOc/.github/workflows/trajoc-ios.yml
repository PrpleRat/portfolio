# Build simulateur — racine du dépôt = ce dossier (project.yml à la racine).

name: TrajOc iOS

on:
  push:
    branches: [main, master]
    paths:
      - "TrajOc/**"
      - "TrajOcWidget/**"
      - "project.yml"
      - "ExportOptions.plist"
      - "ci/**"
      - ".github/workflows/**"
  pull_request:
    paths:
      - "TrajOc/**"
      - "TrajOcWidget/**"
      - "project.yml"
      - "ci/**"
      - ".github/workflows/**"
  workflow_dispatch:

env:
  XCODE_SCHEME: TrajOc
  IOS_DEPLOYMENT_TARGET: "17.0"
  XCODE_VERSION: "26.2"

jobs:
  build:
    name: Build (simulateur)
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sélectionner Xcode 15.4
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Vérifier la structure du projet
        run: |
          test -f project.yml || (echo "project.yml introuvable à la racine du repo" && exit 1)
          test -d TrajOc || (echo "Dossier sources TrajOc/ introuvable" && exit 1)
          xcodebuild -version

      - name: Générer les icônes app
        run: python3 ci/generate-app-icons.py

      - name: Installer XcodeGen
        run: |
          brew install xcodegen
          xcodegen --version

      - name: Préparer xcconfig Release (stubs pour XcodeGen)
        run: |
          test -f ci/Release-App.xcconfig.example
          test -f ci/Release-Widget.xcconfig.example
          cp ci/Release-App.xcconfig.example ci/Release-App.xcconfig
          cp ci/Release-Widget.xcconfig.example ci/Release-Widget.xcconfig

      - name: Préparer APIKeys
        env:
          SNCF_API_KEY: ${{ secrets.SNCF_API_KEY }}
          NAVITIA_API_KEY: ${{ secrets.NAVITIA_API_KEY }}
          ORS_API_KEY: ${{ secrets.ORS_API_KEY }}
          JCDECAUX_API_KEY: ${{ secrets.JCDECAUX_API_KEY }}
        run: |
          if { [ -n "$SNCF_API_KEY" ] || [ -n "$NAVITIA_API_KEY" ]; } && [ -n "$ORS_API_KEY" ] && [ -n "$JCDECAUX_API_KEY" ]; then
            bash ci/generate-api-keys.sh
          else
            cp TrajOc/Config/APIKeys.example.swift TrajOc/Config/APIKeys.swift
            echo "Secrets API absents — build simulateur avec placeholders"
          fi

      - name: Générer le projet Xcode
        run: xcodegen generate --spec project.yml

      - name: Build app + widget (sans signature)
        run: |
          set -euo pipefail
          LOG="${RUNNER_TEMP}/xcode-build.log"
          set +e
          xcodebuild build \
            -project "TrajOc.xcodeproj" \
            -scheme "${{ env.XCODE_SCHEME }}" \
            -sdk iphonesimulator \
            -destination "generic/platform=iOS Simulator" \
            -configuration Debug \
            IPHONEOS_DEPLOYMENT_TARGET="${{ env.IOS_DEPLOYMENT_TARGET }}" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            2>&1 | tee "$LOG"
          STATUS=${PIPESTATUS[0]}
          set -e
          if [ "$STATUS" -ne 0 ]; then
            echo "::group::Erreurs de compilation Swift"
            grep -E "error:" "$LOG" | tail -80 || echo "(aucune ligne 'error:' — voir le log complet ci-dessus)"
            echo "::endgroup::"
            exit "$STATUS"
          fi
